name: CI

# Auto-triggers are disabled for now. Uncomment to run on push / PR.
# on:
#     push:
#         branches: [main]
#     pull_request:
on:
    workflow_dispatch: {}

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: cp .env.example .env

            - run: pnpm install --frozen-lockfile

            - run: pnpm lint

            - run: pnpm typecheck

            - run: pnpm build
