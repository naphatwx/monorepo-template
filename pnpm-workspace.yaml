packages:
    - 'apps/*'
    - 'packages/*/*'
onlyBuiltDependencies:
    - '@parcel/watcher'
    - '@prisma/client'
    - '@swc/core'
    - 'esbuild'
    - 'prisma'

# Central version list. Each package references these with "catalog:".
# To upgrade a dependency, change the version here only.
catalog:
    # Tooling
    typescript: ^5.7.3
    eslint: ^9.18.0
    typescript-eslint: ^8.0.0
    '@eslint/js': ^9.18.0
    prettier: ^3.4.2
    turbo: ^2.8.17
    tsx: ^4.21.0
    cross-env: ^10.1.0

    # Types
    '@types/node': ^22.10.7
    '@types/react': ^19.0.0
    '@types/react-dom': ^19.0.0
    '@types/express': ^5.0.0

    # NestJS
    '@nestjs/common': ^11.0.1
    '@nestjs/config': ^4.0.3
    '@nestjs/core': ^11.0.1
    '@nestjs/platform-express': ^11.0.1
    '@nestjs/swagger': ^11.2.6
    '@nestjs/cli': ^11.0.0
    '@nestjs/schematics': ^11.0.0
    '@golevelup/nestjs-rabbitmq': ^7.1.2
    nestjs-zod: ^5.3.0
    reflect-metadata: ^0.2.2
    rxjs: ^7.8.1
    '@swc/cli': ^0.8.0
    '@swc/core': ^1.15.18

    # Next / React / web
    next: 16.1.6
    eslint-config-next: 16.1.6
    next-intl: ^4.8.3
    next-themes: ^0.4.6
    react: 19.2.3
    react-dom: 19.2.3
    '@radix-ui/react-slot': ^1.2.4
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    lucide-react: ^0.577.0
    tailwind-merge: ^3.5.0
    tw-animate-css: ^1.4.0
    tailwindcss: ^4.0.0
    '@tailwindcss/postcss': ^4.0.0

    # Data
    zod: ^4.3.6
    '@prisma/client': ^6.0.0
    prisma: ^6.0.0
